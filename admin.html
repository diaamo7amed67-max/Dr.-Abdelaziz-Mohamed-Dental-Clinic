<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم العيادة - د. عبدالعزيز</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f0f4f8; padding: 20px; direction: rtl; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #2a9d8f; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: right; }
        th { background: #264653; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
        .btn-call { background: #2a9d8f; color: white; padding: 5px 10px; text-decoration: none; border-radius: 5px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>جدول حجوزات المرضى</h1>
        <table id="bookingsTable">
            <thead>
                <tr>
                    <th>اسم المريض</th>
                    <th>رقم الموبايل</th>
                    <th>الخدمة</th>
                    <th>الوقت</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAhVNIOiUh_xf8EHV1_HHXkzbV3Fa9saac",
            authDomain: "dr-abdelaziz-clinic.firebaseapp.com",
            projectId: "dr-abdelaziz-clinic",
            storageBucket: "dr-abdelaziz-clinic.firebasestorage.app",
            messagingSenderId: "1072818344694",
            appId: "1:1072818344694:web:dc0ab5e880bcc3ecfc12d7",
            databaseURL: "https://dr-abdelaziz-clinic-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const tableBody = document.querySelector('#bookingsTable tbody');

        database.ref('bookings').on('value', (snapshot) => {
            tableBody.innerHTML = "";
            snapshot.forEach((childSnapshot) => {
                const data = childSnapshot.val();
                const row = `<tr>
                    <td>${data.patientName}</td>
                    <td><a href="tel:${data.patientPhone}" class="btn-call">${data.patientPhone} 📞</a></td>
                    <td>${data.service}</td>
                    <td>${data.timeSent}</td>
                </tr>`;
                tableBody.insertAdjacentHTML('afterbegin', row);
            });
        });
    </script>
</body>
</html>
