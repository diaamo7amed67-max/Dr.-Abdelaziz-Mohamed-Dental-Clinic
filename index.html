<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيادة الابتسامة المشرقة - دكتور أسنان</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <header>
        <nav>
            <div class="logo">Bright<span>Smile</span></div>
            <ul>
                <li><a href="#home">الرئيسية</a></li>
                <li><a href="#services">خدماتنا</a></li>
                <li><a href="#contact">احجز الآن</a></li>
            </ul>
        </nav>
    </header>

    <section id="hero">
        <div class="hero-content">
            <h1>ابتسامتك هي واجهتك الأجمل</h1>
            <p>أحدث تقنيات طب الأسنان بأيدي خبراء نهتم برحتك أولاً.</p>
            <button class="btn">احجز كشفك الآن</button>
        </div>
    </section>

    <section id="services">
        <h2>خدمات العيادة</h2>
        <div class="grid">
            <div class="card">🦷 تبييض الأسنان</div>
            <div class="card">💎 زراعة الأسنان</div>
            <div class="card">✨ تقويم الأسنان</div>
        </div>
    </section>
    <div id="bookingModal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <h2>احجز موعدك الآن</h2>
        <form id="bookingForm">
            <input type="text" placeholder="اسمك بالكامل" required>
            <input type="tel" placeholder="رقم الموبايل" required>
            <select>
                <option value="">اختر الخدمة</option>
                <option value="cleaning">تنظيف وتبييض</option>
                <option value="implants">زراعة أسنان</option>
                <option value="ortho">تقويم</option>
            </select>
            <button type="submit" class="btn">إرسال الطلب</button>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
